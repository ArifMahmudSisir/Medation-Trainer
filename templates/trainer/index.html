{% extends 'trainer/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="p-8 bg-gradient-to-r from-blue-500 to-purple-600 text-white">
            <h2 class="text-3xl font-bold mb-2">Build Your Session</h2>
            <p class="opacity-90">Select your current mood and preferred voice guide.</p>
        </div>

        <form action="{% url 'generate' %}" method="post" class="p-8 space-y-6">
            {% csrf_token %}

            <div>
                <label for="{{ form.mood.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">How are
                    you feeling?</label>
                {{ form.mood }}
                <p class="text-xs text-gray-500 mt-1">We'll tailor the script to help you balance this emotion.</p>
            </div>

            <div>
                <label for="{{ form.voice.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">Choose
                    your Guide</label>
                {{ form.voice }}
                <p class="text-xs text-gray-500 mt-1">Select a voice tone that resonates with you.</p>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200 shadow-md transform hover:scale-[1.01]">
                Generate Meditation
            </button>
        </form>
    </div>
</div>
{% endblock %}
