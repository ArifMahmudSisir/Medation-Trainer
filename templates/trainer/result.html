{% extends 'trainer/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-8">
    <a href="{% url 'index' %}" class="inline-flex items-center text-blue-600 hover:text-blue-800 mb-6 transition">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
        </svg>
        New Session
    </a>

    <div class="grid md:grid-cols-2 gap-8">
        <!-- Audio Player Card -->
        <div
            class="bg-white rounded-2xl shadow-lg p-8 flex flex-col justify-center items-center text-center space-y-6 h-fit">
            <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center">
                <span class="text-4xl">🎧</span>
            </div>
            <div>
                <h3 class="text-2xl font-bold text-gray-800">Your Session is Ready</h3>
                <p class="text-gray-500">Focused on: <span class="font-semibold text-blue-600">{{ mood }}</span></p>
            </div>

            <audio controls class="w-full mt-4" autoplay>
                <source src="{{ audio_url }}" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <div class="text-sm text-gray-400">
                <p>Listen comfortably. Close your eyes if you wish.</p>
            </div>
        </div>

        <!-- Script Card -->
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h3 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">Generated Script</h3>
            <div
                class="prose prose-slate max-w-none text-gray-600 leading-relaxed max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                {{ script|linebreaks }}
            </div>
        </div>
    </div>
</div>

<style>
    /* Custom Scrollbar for script */
    .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
    }
</style>
{% endblock %}
